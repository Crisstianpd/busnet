<!-- @dsCard group="Colors" viewport="700x200" name="Paleta de rutas (8 categóricas)" subtitle="Distinguibles sobre #0B1220 — para pintar rutas de bus" -->
<!doctype html>
<html lang="es"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;background:var(--night);font-family:var(--font-ui);padding:22px}
  .grid{display:grid;grid-template-columns:repeat(8,1fr);gap:12px}
  .cell{display:flex;flex-direction:column;align-items:center;gap:8px}
  .badge{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-family:var(--font-display);font-weight:800;font-size:18px;color:#08130D;border:2px solid rgba(8,19,13,.3);box-shadow:var(--shadow-marker)}
  .line{width:100%;height:6px;border-radius:3px}
  .nm{font-family:var(--font-mono);font-size:10px;color:var(--text-tertiary)}
</style></head><body>
  <div class="grid" id="g"></div>
<script>
  const routes=[["--route-1","30"],["--route-2","7"],["--route-3","101"],["--route-4","42"],["--route-5","12"],["--route-6","2B"],["--route-7","8"],["--route-8","5"]];
  document.getElementById('g').innerHTML = routes.map((r,i)=>`
    <div class="cell">
      <div class="badge" style="background:var(${r[0]})">${r[1]}</div>
      <div class="line" style="background:var(${r[0]})"></div>
      <div class="nm">route-${i+1}</div>
    </div>`).join('');
</script>
</body></html>
