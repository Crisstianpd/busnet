<!doctype html>
<html lang="es"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;background:var(--surface);padding:24px;color:var(--text-primary)}
  p{margin:0 0 10px;font-family:var(--font-ui)}
  .lg{font-size:var(--text-body-lg);font-weight:600}
  .bd{font-size:var(--text-body);color:var(--text-secondary)}
  .sm{font-size:var(--text-sm);color:var(--text-tertiary)}
  .mono{font-family:var(--font-mono);font-weight:700;font-size:15px;background:var(--surface-raised);padding:4px 8px;border-radius:6px;display:inline-block;margin-right:8px}
  .h{font-family:var(--font-mono);font-size:11px;color:var(--text-tertiary);margin-top:4px}
</style></head><body>
  <p class="lg">Camina 450 m hasta la parada Metrocentro.</p>
  <p class="bd">Toma la ruta 30B — sale cada ~12 minutos. Bájate en la 4ª parada y transborda a la 7D.</p>
  <p class="sm">Los puntos de abordaje son aproximados.</p>
  <p style="margin-top:14px"><span class="mono">P-482-AB</span><span class="mono">30B · 101</span></p>
  <div class="h">--font-ui (Manrope) · --font-mono (JetBrains Mono)</div>
</body></html>
