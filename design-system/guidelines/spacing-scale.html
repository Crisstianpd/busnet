<!doctype html>
<html lang="es"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;background:var(--surface);font-family:var(--font-ui);padding:24px;display:flex;align-items:flex-end;gap:14px}
  .cell{display:flex;flex-direction:column;align-items:center;gap:8px}
  .bar{background:var(--busnet-green);border-radius:4px;width:28px}
  .nm{font-family:var(--font-mono);font-size:11px;color:var(--text-tertiary)}
</style></head><body>
  <div id="g" style="display:flex;align-items:flex-end;gap:14px"></div>
<script>
  const s=[["1",4],["2",8],["3",12],["4",16],["5",20],["6",24],["8",32],["10",40],["12",48]];
  document.getElementById('g').innerHTML=s.map(x=>`<div class="cell"><div class="bar" style="height:${x[1]}px"></div><div class="nm">${x[1]}</div></div>`).join('');
</script>
</body></html>
