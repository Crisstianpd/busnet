<!-- @dsCard group="Colors" viewport="700x150" name="Superficies noche" subtitle="Fondo app/mapa oscuro y superficies elevadas" -->
<!doctype html>
<html lang="es"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;background:#050a13;font-family:var(--font-ui);padding:20px;display:flex;gap:12px}
  .sw{flex:1;border-radius:var(--radius-md);padding:14px;display:flex;flex-direction:column;justify-content:space-between;min-height:96px;border:1px solid var(--hairline);color:var(--text-primary)}
  .nm{font-size:13px;font-weight:800}.hex{font-family:var(--font-mono);font-size:12px;color:var(--text-secondary)}
</style></head><body>
  <div class="sw" style="background:var(--night)"><span class="nm">Azul noche</span><span class="hex">#0B1220 · --night</span></div>
  <div class="sw" style="background:var(--surface)"><span class="nm">Superficie</span><span class="hex">#141C2B · --surface</span></div>
  <div class="sw" style="background:var(--surface-raised)"><span class="nm">Elevada</span><span class="hex">#1D2839 · --surface-raised</span></div>
</body></html>
