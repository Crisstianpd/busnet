<!-- @dsCard group="Colors" viewport="700x150" name="Semánticos" subtitle="Ámbar (alerta/ETA/premium), rojo (error), azul (info)" -->
<!doctype html>
<html lang="es"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;background:var(--night);font-family:var(--font-ui);padding:20px;display:flex;gap:12px}
  .sw{flex:1;border-radius:var(--radius-md);padding:14px;display:flex;flex-direction:column;justify-content:space-between;min-height:96px}
  .nm{font-size:13px;font-weight:800}.hex{font-family:var(--font-mono);font-size:12px;opacity:.85}
</style></head><body>
  <div class="sw" style="background:var(--amber);color:var(--text-on-amber)"><span class="nm">Ámbar</span><span class="hex">#FFB020 · --amber</span></div>
  <div class="sw" style="background:var(--red);color:#fff"><span class="nm">Rojo</span><span class="hex">#FF4D4D · --red</span></div>
  <div class="sw" style="background:var(--info);color:#04121f"><span class="nm">Info</span><span class="hex">#3B9CFF · --info</span></div>
</body></html>
