<!doctype html>
<html lang="es"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;background:var(--surface);font-family:var(--font-ui);padding:24px;display:flex;flex-direction:column;gap:10px}
  .r{display:flex;align-items:baseline;gap:14px}
  .t{font-size:20px;font-weight:700}.h{font-family:var(--font-mono);font-size:12px;color:var(--text-tertiary)}
</style></head><body>
  <div class="r"><span class="t" style="color:var(--text-primary)">Tu bus llega en 6 min</span><span class="h">#F3F6FB · --text-primary</span></div>
  <div class="r"><span class="t" style="color:var(--text-secondary)">Ruta 30B · cada 12 min</span><span class="h">#93A1B5 · --text-secondary</span></div>
  <div class="r"><span class="t" style="color:var(--text-tertiary)">Actualizado hace 2 s</span><span class="h">--text-tertiary</span></div>
