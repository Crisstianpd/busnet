<!-- @dsCard group="Components" viewport="700x300" name="BottomSheet · KpiCard" subtitle="Sheet over the map + dashboard metric cards" -->
<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--night); font-family: var(--font-ui); padding: 24px; }
  .wrap { display: grid; grid-template-columns: 300px 1fr; gap: 20px; align-items: start; }
  .map { position: relative; height: 250px; border-radius: var(--radius-lg); overflow: hidden;
    background: radial-gradient(120% 120% at 30% 10%, #16233a 0%, var(--night) 70%); border: 1px solid var(--hairline); }
  .kpis { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  h4 { color: var(--text-primary); font-size: 17px; font-weight: 800; margin: 0 0 4px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { BottomSheet, KpiCard } = window.BusNETDesignSystem_abb9a1;
  function Demo() {
    const [snap, setSnap] = React.useState("half");
    return (
      <div className="wrap">
        <div className="map">
          <BottomSheet snap={snap} onSnapChange={setSnap}
            heights={{ collapsed: 70, half: 210, expanded: 240 }}
            header={<h4>3 rutas hacia el centro</h4>}>
            <div style={{color:"var(--text-secondary)", fontSize:14, lineHeight:1.5}}>
              Toca la barra para colapsar, medio o expandir. Aquí van las tarjetas de viaje.
            </div>
          </BottomSheet>
        </div>
        <div className="kpis">
          <KpiCard label="Unidades activas" value="42" icon="bus" delta="+4" deltaDirection="up" />
          <KpiCard label="Vueltas hoy" value="318" icon="repeat" />
          <KpiCard label="Puntualidad" value="91" unit="%" icon="gauge" tone="amber" delta="-2%" deltaDirection="down" />
          <KpiCard label="Checkings" value="1.2k" icon="check-check" tone="info" />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
